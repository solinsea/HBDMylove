<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="particles-container"></div>
    
    <header class="hero" id="home">
        <div class="hero-content fade-in">
            <h1 class="typing-text"></h1>
            <p class="subtitle fade-in">Wishing you the most beautiful day...</p>
            <a href="#gallery" class="scroll-down">
                <i class="fa-solid fa-chevron-down"></i>
            </a>
        </div>
    </header>

    <section id="gallery" class="gallery-section">
        <h2 class="section-title fade-in">Our Memories ✨</h2>
        <div class="gallery-grid">
            <div class="gallery-item fade-in"><img src="Picture/1000031703.jpg" alt="Memory"></div>
            <div class="gallery-item fade-in"><img src="Picture/1000032280.jpg" alt="Memory"></div>
            <div class="gallery-item fade-in"><img src="Picture/163cdb13-21f9-43d5-978e-3340ace0acf1.jpg" alt="Memory"></div>
            <div class="gallery-item fade-in"><img src="Picture/IMG_0448 (2).JPG" alt="Memory"></div>
            <div class="gallery-item fade-in"><img src="Picture/IMG_0558.JPG" alt="Memory"></div>
            <div class="gallery-item fade-in"><img src="Picture/IMG_0814-3.JPG" alt="Memory"></div>
            <div class="gallery-item fade-in"><img src="Picture/IMG_0834-5.JPG" alt="Memory"></div>
            <div class="gallery-item fade-in"><img src="Picture/IMG_1027 (2)-19.JPG" alt="Memory"></div>
            <div class="gallery-item fade-in"><img src="Picture/IMG_2311.JPG" alt="Memory"></div>
            <div class="gallery-item fade-in"><img src="Picture/IMG_3930.JPG" alt="Memory"></div>
            <div class="gallery-item fade-in"><img src="Picture/IMG_4022.jpg" alt="Memory"></div>
            <div class="gallery-item fade-in"><img src="Picture/IMG_8676.JPG" alt="Memory"></div>
        </div>
    </section>

    <section class="message-section" id="message">
        <div class="message-card fade-in">
            <h2>A special message for you...</h2>
            <p>
                Happy Birthday to the most amazing person in the world! 💖<br>
                Thank you for filling my life with joy and beautiful moments. <br>
                I hope this year brings you all the happiness and success you deserve. <br>
                I love you! 🥰
            </p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
